<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Calendar</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background: #191919;  
            color: white;
            box-sizing: border-box;
        }

        .widget-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 20px;  
            background: linear-gradient(145deg, #252540, #1c1c30);
            box-shadow: 
                0 8px 20px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);  
            padding: 20px;
            text-align: center;
        }

        .header {
            font-size: 0.7rem;
            margin-bottom: 8px;
            color: #b8b8d1;
            letter-spacing: 1px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f472b6;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 15px rgba(244, 114, 182, 0.5);
        }

        .stat-label {
            font-size: 0.55rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .calendar-container {
            display: grid;
            grid-template-columns: repeat(52, 5px);
            gap: 1px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .week {
            width: 5px;
            height: 5px;
            border-radius: 1px;
            background: rgba(139, 92, 246, 0.15);
        }

        .week.lived {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
        }

        .week.current {
            background: linear-gradient(135deg, #f472b6, #db2777);
            box-shadow: 0 0 4px rgba(244, 114, 182, 0.8);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .legend {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            font-size: 0.55rem;
            color: #888;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-box {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }

        .legend-box.lived {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
        }

        .legend-box.current {
            background: linear-gradient(135deg, #f472b6, #db2777);
        }

        .legend-box.future {
            background: rgba(139, 92, 246, 0.15);
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="header">LIFE CALENDAR</div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="weeks-lived">0</div>
                <div class="stat-label">Weeks Lived</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="days-lived">0</div>
                <div class="stat-label">Days Lived</div>
            </div>
        </div>

        <div class="calendar-container" id="calendar"></div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-box lived"></div>
                <span>Lived</span>
            </div>
            <div class="legend-item">
                <div class="legend-box current"></div>
                <span>Now</span>
            </div>
            <div class="legend-item">
                <div class="legend-box future"></div>
                <span>Future</span>
            </div>
        </div>
    </div>

    <script>
        const LIFE_EXPECTANCY = 100;
        const WEEKS_PER_YEAR = 52;
        const BIRTHDATE = '1989-05-04';
        
        const calendarContainer = document.getElementById('calendar');
        const weeksLivedEl = document.getElementById('weeks-lived');
        const daysLivedEl = document.getElementById('days-lived');

        function calculateTime(birthdate) {
            const now = new Date();
            const birth = new Date(birthdate);
            const diffTime = now - birth;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const diffWeeks = Math.floor(diffTime / (1000 * 60 * 60 * 24 * 7));
            return { days: diffDays, weeks: diffWeeks };
        }

        function renderCalendar() {
            const { days, weeks } = calculateTime(BIRTHDATE);
            const totalWeeks = LIFE_EXPECTANCY * WEEKS_PER_YEAR;

            weeksLivedEl.textContent = weeks.toLocaleString();
            daysLivedEl.textContent = days.toLocaleString();

            calendarContainer.innerHTML = '';

            for (let i = 0; i < totalWeeks; i++) {
                const weekEl = document.createElement('div');
                weekEl.className = 'week';

                if (i < weeks) {
                    weekEl.classList.add('lived');
                } else if (i === weeks) {
                    weekEl.classList.add('current');
                }

                calendarContainer.appendChild(weekEl);
            }
        }

        renderCalendar();
    </script>
</body>
</html>
